spring:
  application:
    name: carepath-backend
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/carepath_db}
    username: ${SPRING_DATASOURCE_USERNAME:carepath_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:dev_password_only_123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          # Replace this with your actual Firebase or Auth0 issuer URI
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:https://securetoken.google.com/your-firebase-project-id}

server:
  port: 8080

logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
