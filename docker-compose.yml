version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: carepath-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-carepath_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_only_123}
      POSTGRES_DB: ${POSTGRES_DB:-carepath_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
